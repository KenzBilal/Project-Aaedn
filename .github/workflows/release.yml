name: aaedn-release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/aaedn dist/aaedn-linux-x86_64
          chmod +x dist/aaedn-linux-x86_64
          sha256sum dist/aaedn-linux-x86_64 > dist/SHA256SUMS.txt

      - name: Verify checksum file
        run: |
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aaedn-linux-x86_64
            dist/SHA256SUMS.txt
